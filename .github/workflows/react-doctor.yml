name: 🏥 React Doctor

on: push

permissions:
  contents: read
  pull-requests: write

jobs:
  react-doctor:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: millionco/react-doctor@6543a86f9dfe86c894bd71361fc2c46d8d9c967d
        with:
          node-version: 24
          fail-on: error
          diff: true
          annotations: true
